services:
  - type: web
    name: oalevel-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    nodeVersion: "20"
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # Neon PostgreSQL connection string — set this in Render dashboard
      # Format: postgresql://user:password@ep-xxx.us-east-2.aws.neon.tech/dbname?sslmode=require
      - key: DATABASE_URL
        generateValue: false
        value: ""
      # Set this on first deploy to initialise the admin password
      - key: ADMIN_DEFAULT_PASSWORD
        generateValue: false
        value: ""
      - key: SESSION_SECRET
        generateValue: true
    # No disk mount needed — all data lives in Neon PostgreSQL
    healthCheckPath: /api/healthz
